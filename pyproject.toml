# 项目工具统一配置入口 / Unified tool configuration for the project

[tool.ruff]
# 目标 Python 版本 / Target Python version
target-version = "py312"
# 单行最大字符数 / Maximum line length
line-length = 100
# 需要检查的目录 / Directories to check
src = ["control-plane", "tests"]
# 排除不需要检查的目录 / Exclude directories that don't need checking
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.egg-info",
]

[tool.ruff.lint]
# 启用的规则集 / Enabled rule sets:
#   E/W  = pycodestyle 基础规范 / basic style
#   F    = pyflakes 逻辑错误 / logic errors
#   I    = isort 导入排序 / import sorting
#   UP   = pyupgrade 语法现代化 / modernize syntax
#   B    = bugbear 常见 bug 模式 / common bug patterns
#   N    = pep8-naming 命名规范 / naming conventions
select = ["E", "W", "F", "I", "UP", "B", "N"]
ignore = [
    "E501",   # 行长由 ruff format 控制，此处不重复报错 / line length handled by formatter
    "B008",   # FastAPI 的 Depends() 需要在默认参数里调用函数 / FastAPI Depends() calls in defaults
]

[tool.ruff.lint.isort]
# 将 control-plane 子模块视为本地包 / Treat control-plane submodules as first-party
known-first-party = ["main", "manager", "db"]

[tool.ruff.format]
# 字符串使用双引号 / Use double quotes for strings
quote-style = "double"
indent-style = "space"

# ── mypy 类型检查配置 / mypy type check config ────────────────────────────────
[tool.mypy]
python_version = "3.12"
# 不报告缺失的第三方库类型桩 / Don't report missing third-party type stubs
ignore_missing_imports = true
# 不允许 Optional 被隐式推断为 None / Disallow implicit Optional from None defaults
no_implicit_optional = true
# 提示未覆盖的类型 / Warn about untyped definitions
warn_return_any = true

# ── pytest 配置 / pytest config ───────────────────────────────────────────────
[tool.pytest.ini_options]
# 测试目录 / Test directories
testpaths = ["tests"]
# asyncio 测试自动模式 / Auto mode for asyncio tests
asyncio_mode = "auto"
# 简短失败摘要 / Short failure summary
addopts = "--tb=short -q"
